apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    general_settings:
      database_url: os.environ/DATABASE_URL
      master_key: os.environ/LITELLM_MASTER_KEY
    litellm_settings:
      callbacks:
      - prometheus
      drop_params: true
      enable_passthrough_endpoints: true
      failure_callback: []
      fallbacks:
      - claude-opus-4-6-us:
        - claude-opus-4-6-global
      - claude-opus-4-6-global:
        - claude-opus-4-1
      - claude-opus-4-1:
        - claude-opus-4-5
      - claude-opus-4-5:
        - claude-sonnet-4-6-us
      - claude-sonnet-4-6-us:
        - claude-sonnet-4-6-global
      - claude-sonnet-4-6-global:
        - claude-sonnet-4-5
      - claude-sonnet-4-5:
        - claude-sonnet-3-7
      - claude-sonnet-3-7:
        - claude-sonnet-3-5
      - claude-haiku-4-5:
        - claude-sonnet-3-5
      json_logs: true
      log_raw_request_response: false
      model_group_alias:
        # NOTE: model_group_alias works for /chat/completions (OpenAI format) only.
        # For /v1/messages (Anthropic format), aliases are handled by duplicate model_list entries below.
        claude-opus-4-1-20250805: claude-opus-4-1
        claude-opus-4-1-20250805-v1: claude-opus-4-1
      num_retries: 3
      request_timeout: 600
      success_callback: []
      telemetry: false
      turn_off_message_logging: false
    model_list:
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-opus-4-6-v1
      model_info:
        id: claude-opus-4-6-us
      model_name: claude-opus-4-6-us
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/global.anthropic.claude-opus-4-6-v1
      model_info:
        id: claude-opus-4-6-global
      model_name: claude-opus-4-6-global
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/global.anthropic.claude-opus-4-5-20251101-v1:0
      model_info:
        id: claude-opus-4-5
      model_name: claude-opus-4-5
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-opus-4-1-20250805-v1:0
      model_info:
        id: claude-opus-4-1
      model_name: claude-opus-4-1
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-sonnet-4-6
      model_info:
        id: claude-sonnet-4-6-us
      model_name: claude-sonnet-4-6-us
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/global.anthropic.claude-sonnet-4-6
      model_info:
        id: claude-sonnet-4-6-global
      model_name: claude-sonnet-4-6-global
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-opus-4-6-v1
      model_info:
        id: claude-opus-4-6
      model_name: claude-opus-4-6
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-sonnet-4-6
      model_info:
        id: claude-sonnet-4-6
      model_name: claude-sonnet-4-6
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/global.anthropic.claude-haiku-4-5-20251001-v1:0
      model_info:
        id: claude-haiku-4-5-20251001
      model_name: claude-haiku-4-5-20251001
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/global.anthropic.claude-sonnet-4-5-20250929-v1:0
      model_info:
        id: claude-sonnet-4-5
      model_name: claude-sonnet-4-5
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-3-7-sonnet-20250219-v1:0
      model_info:
        id: claude-sonnet-3-7
      model_name: claude-sonnet-3-7
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-3-5-sonnet-20241022-v2:0
      model_info:
        id: claude-sonnet-3-5
      model_name: claude-sonnet-3-5
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/global.anthropic.claude-haiku-4-5-20251001-v1:0
      model_info:
        id: claude-haiku-4-5
      model_name: claude-haiku-4-5
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/*
      model_info:
        id: bedrock-wildcard
      model_name: bedrock/*
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-opus-4-6-v1
      model_info:
        id: alias-claude-opus-4-6-20250915
      model_name: claude-opus-4-6-20250915
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-sonnet-4-6
      model_info:
        id: alias-claude-sonnet-4-6-20250514
      model_name: claude-sonnet-4-6-20250514
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/global.anthropic.claude-haiku-4-5-20251001-v1:0
      model_info:
        id: alias-claude-haiku-4-5-20241022
      model_name: claude-haiku-4-5-20241022
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/global.anthropic.claude-sonnet-4-5-20250929-v1:0
      model_info:
        id: alias-claude-sonnet-4-5-20250929
      model_name: claude-sonnet-4-5-20250929
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/global.anthropic.claude-opus-4-5-20251101-v1:0
      model_info:
        id: alias-claude-opus-4-5-20251101
      model_name: claude-opus-4-5-20251101
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-3-7-sonnet-20250219-v1:0
      model_info:
        id: alias-claude-sonnet-3-7-20250219
      model_name: claude-sonnet-3-7-20250219
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-3-5-sonnet-20241022-v2:0
      model_info:
        id: alias-claude-sonnet-3-5-20241022
      model_name: claude-sonnet-3-5-20241022
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-opus-4-6-v1
      model_info:
        id: alias-opus
      model_name: opus
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-sonnet-4-6
      model_info:
        id: alias-sonnet
      model_name: sonnet
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/global.anthropic.claude-haiku-4-5-20251001-v1:0
      model_info:
        id: alias-haiku
      model_name: haiku
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-opus-4-1-20250805-v1:0
      model_info:
        id: alias-claude-opus-4-1-20250805
      model_name: claude-opus-4-1-20250805
    - litellm_params:
        aws_region_name: us-west-2
        model: bedrock/us.anthropic.claude-opus-4-1-20250805-v1:0
      model_info:
        id: alias-us-anthropic-opus-4-1
      model_name: us.anthropic.claude-opus-4-1-20250805-v1:0
    router_settings:
      allowed_fails: 3
      cooldown_time: 60
      enable_pre_call_checks: true
      num_retries: 2
      routing_strategy: simple-shuffle
      timeout: 600
