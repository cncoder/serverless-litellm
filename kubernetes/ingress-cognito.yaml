# ====================================================================
# LiteLLM UI Ingress 配置 - 带 Cognito 认证版本
# ====================================================================
#
# 此文件仅在 enable_cognito=true 时由 post-deploy 脚本应用
# 替代 ingress.yaml 中的 litellm-ingress-ui 部分
#
# 变量占位符（由 terraform post-deploy 通过 envsubst 替换）:
#   ${LITELLM_HOST}              - LiteLLM API/UI 域名
#   ${ACM_CERTIFICATE_ARN}       - ACM 证书 ARN
#   ${COGNITO_USER_POOL_ARN}     - Cognito User Pool ARN
#   ${COGNITO_USER_POOL_CLIENT_ID} - Cognito Client ID
#   ${COGNITO_USER_POOL_DOMAIN}  - Cognito 域名
# ====================================================================

---
# ====================================================================
# UI Ingress - 管理界面，需要 Cognito 认证
# ====================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm-ingress-ui
  namespace: litellm
  labels:
    app: litellm
  annotations:
    # ALB 基础配置
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: litellm-shared        # 共享 ALB 组名
    alb.ingress.kubernetes.io/group.order: "50"                 # 优先级 50 (最低)

    # HTTPS 配置
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: ${ACM_CERTIFICATE_ARN}
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06

    # 健康检查
    alb.ingress.kubernetes.io/healthcheck-path: /health/liveliness
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # Cognito 认证配置
    alb.ingress.kubernetes.io/auth-type: cognito
    alb.ingress.kubernetes.io/auth-idp-cognito: '{"userPoolARN":"${COGNITO_USER_POOL_ARN}","userPoolClientID":"${COGNITO_USER_POOL_CLIENT_ID}","userPoolDomain":"${COGNITO_USER_POOL_DOMAIN}"}'
    alb.ingress.kubernetes.io/auth-on-unauthenticated-request: authenticate
    alb.ingress.kubernetes.io/auth-scope: "openid"
    alb.ingress.kubernetes.io/auth-session-cookie: "AWSELBAuthSessionCookie"
    alb.ingress.kubernetes.io/auth-session-timeout: "3600"
spec:
  rules:
  - host: ${LITELLM_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: litellm-service
            port:
              number: 80
