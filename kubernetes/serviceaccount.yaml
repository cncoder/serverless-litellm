# IRSA (IAM Roles for Service Accounts) - Fargate compatible
# The role ARN is injected by Terraform post-deploy via envsubst
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-sa
  namespace: litellm
  labels:
    app: litellm
  annotations:
    eks.amazonaws.com/role-arn: "${LITELLM_POD_ROLE_ARN}"
