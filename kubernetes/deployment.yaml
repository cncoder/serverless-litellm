# ====================================================================
# LiteLLM Deployment - 核心应用部署配置
# Secrets 通过 Init Container 从 AWS Secrets Manager 注入（非 K8s Secret）
# ====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-deployment
  namespace: litellm
  labels:
    app: litellm
spec:
  replicas: 2                                    # 初始副本数 2

  # 滚动更新策略
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1                                # 最多额外创建 1 个 Pod
      maxUnavailable: 0                          # 更新时不允许不可用

  selector:
    matchLabels:
      app: litellm

  template:
    metadata:
      labels:
        app: litellm
    spec:
      # 使用 IRSA（IAM Roles for Service Accounts）服务账户
      serviceAccountName: litellm-sa

      # Init Container: 从 Secrets Manager 拉取 secrets 写入 emptyDir
      initContainers:
      - name: secrets-init
        image: amazon/aws-cli:latest
        command:
          - sh
          - -c
          - |
            set -e
            # Fetch Master Key from Secrets Manager
            MASTER_KEY=$(aws secretsmanager get-secret-value \
              --secret-id "$MASTER_KEY_SECRET_ID" \
              --region "$AWS_REGION" \
              --query SecretString --output text)

            # Fetch DB Password from Secrets Manager
            DB_PASSWORD=$(aws secretsmanager get-secret-value \
              --secret-id "$DB_PASSWORD_SECRET_ID" \
              --region "$AWS_REGION" \
              --query SecretString --output text)

            # Construct DATABASE_URL by replacing placeholder
            DATABASE_URL=$(echo "$DATABASE_URL_BASE" | sed "s|__DB_PASSWORD__|${DB_PASSWORD}|g")

            # Write env file for main container
            cat > /secrets/.env <<EOF
            export LITELLM_MASTER_KEY="${MASTER_KEY}"
            export DATABASE_URL="${DATABASE_URL}"
            export AWS_REGION="${AWS_REGION}"
            EOF

            echo "Secrets successfully fetched from Secrets Manager"
        env:
        - name: MASTER_KEY_SECRET_ID
          value: "$MASTER_KEY_SECRET_ID"
        - name: DB_PASSWORD_SECRET_ID
          value: "$DB_PASSWORD_SECRET_ID"
        - name: DATABASE_URL_BASE
          value: "$DATABASE_URL_BASE"
        - name: AWS_REGION
          value: "$AWS_REGION_VAL"
        volumeMounts:
        - name: secrets-volume
          mountPath: /secrets
        resources:
          requests:
            cpu: "256m"
            memory: "256Mi"
          limits:
            cpu: "256m"
            memory: "256Mi"

      containers:
      - name: litellm
        image: $ECR_REPOSITORY_URL:latest
        imagePullPolicy: Always

        # 容器端口
        ports:
        - name: http
          containerPort: 4000
          protocol: TCP

        # 启动命令: source secrets 然后启动 litellm
        command:
          - sh
          - -c
          - |
            . /secrets/.env
            exec litellm --config /app/config.yaml --detailed_debug

        # 配置文件挂载
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: secrets-volume
          mountPath: /secrets
          readOnly: true

        # 资源限制 (Fargate: requests = limits)
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "1"
            memory: "2Gi"

        # 存活探针 - 检查容器是否存活
        livenessProbe:
          httpGet:
            path: /health/liveliness
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3

        # 就绪探针 - 检查容器是否准备好接收流量
        readinessProbe:
          httpGet:
            path: /health/liveliness
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      # 卷定义
      volumes:
      - name: config
        configMap:
          name: litellm-config
      - name: secrets-volume
        emptyDir:
          medium: Memory           # tmpfs，secrets 不落盘
          sizeLimit: 1Mi
