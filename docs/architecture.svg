<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="awsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#232f3e;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#232f3e;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <!-- AWS Background -->
  <rect x="180" y="80" width="600" height="420" rx="12" fill="url(#awsGrad)" stroke="#232f3e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="195" y="100" font-size="11" fill="#666" font-weight="600">AWS Cloud</text>

  <!-- Clients -->
  <rect x="20" y="155" width="120" height="40" rx="8" fill="#fff" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="179" text-anchor="middle" font-weight="600" fill="#333">Claude Code</text>

  <rect x="20" y="215" width="120" height="40" rx="8" fill="#fff" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="239" text-anchor="middle" font-weight="600" fill="#333">OpenClaw</text>

  <rect x="20" y="275" width="120" height="40" rx="8" fill="#fff" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="299" text-anchor="middle" font-weight="600" fill="#333">自研应用</text>

  <!-- Arrows from clients -->
  <line x1="140" y1="175" x2="205" y2="240" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="235" x2="205" y2="240" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="295" x2="205" y2="250" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ALB -->
  <rect x="210" y="210" width="130" height="60" rx="10" fill="#ff9900" filter="url(#shadow)"/>
  <text x="275" y="237" text-anchor="middle" font-weight="700" fill="#fff" font-size="14">ALB</text>
  <text x="275" y="255" text-anchor="middle" fill="#fff" font-size="10">HTTPS · WAF</text>

  <!-- Arrow ALB to Auth split -->
  <line x1="340" y1="225" x2="390" y2="190" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="255" x2="390" y2="290" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- API Key path -->
  <rect x="395" y="165" width="120" height="50" rx="8" fill="#e8f4fd" stroke="#146eb4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="455" y="186" text-anchor="middle" font-weight="600" fill="#146eb4" font-size="12">/v1/* API</text>
  <text x="455" y="202" text-anchor="middle" fill="#146eb4" font-size="10">API Key 认证</text>

  <!-- Cognito path -->
  <rect x="395" y="270" width="120" height="50" rx="8" fill="#fef3e8" stroke="#ff9900" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="455" y="291" text-anchor="middle" font-weight="600" fill="#c47600" font-size="12">/ui Admin</text>
  <text x="455" y="307" text-anchor="middle" fill="#c47600" font-size="10">Cognito 认证</text>

  <!-- Arrows to LiteLLM -->
  <line x1="515" y1="190" x2="555" y2="225" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="515" y1="295" x2="555" y2="255" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LiteLLM -->
  <rect x="560" y="200" width="180" height="80" rx="10" fill="#146eb4" filter="url(#shadow)"/>
  <text x="650" y="230" text-anchor="middle" font-weight="700" fill="#fff" font-size="14">LiteLLM</text>
  <text x="650" y="248" text-anchor="middle" fill="#d4e8f7" font-size="11">EKS Fargate · 2-10 pods</text>
  <text x="650" y="266" text-anchor="middle" fill="#d4e8f7" font-size="11">IRSA 零静态凭证</text>

  <!-- Arrow to Bedrock -->
  <line x1="650" y1="280" x2="580" y2="370" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow to RDS -->
  <line x1="650" y1="280" x2="720" y2="370" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bedrock -->
  <rect x="490" y="375" width="160" height="80" rx="10" fill="#232f3e" filter="url(#shadow)"/>
  <text x="570" y="400" text-anchor="middle" font-weight="700" fill="#ff9900" font-size="13">Amazon Bedrock</text>
  <text x="570" y="420" text-anchor="middle" fill="#adb5bd" font-size="11">Claude 全系列</text>
  <text x="570" y="438" text-anchor="middle" fill="#adb5bd" font-size="10">跨 Region 负载均衡</text>

  <!-- RDS -->
  <rect x="670" y="375" width="100" height="80" rx="10" fill="#3b48cc" filter="url(#shadow)"/>
  <text x="720" y="405" text-anchor="middle" font-weight="700" fill="#fff" font-size="13">RDS</text>
  <text x="720" y="423" text-anchor="middle" fill="#c8cbff" font-size="10">PostgreSQL</text>
  <text x="720" y="438" text-anchor="middle" fill="#c8cbff" font-size="10">Key · 用量</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
  </defs>
</svg>
